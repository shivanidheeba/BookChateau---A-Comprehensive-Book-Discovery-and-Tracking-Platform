<html>
    <head>
        <title>BookChâteau: Sign Up</title>
        <link rel="stylesheet" href="signup.css">
        <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lato:wght@300;400;500;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body>
        
        <div id="site-name">
        <div id="gold-text"><a href="about.html">BookChâteau</a></div>
        </div>
        
        <div class="container">

         <img src="reader.png" alt="icon">
            
        <div class="welcome">
        <h2>Welcome, Dearest Gentle Reader</h2>
        <h2>Sign Up</h2>
        </div>

    <form>
    <table>
        <tr>
            <td><label for="fullname">Full Name</label></td>
            <td><input type="text" id="fullname" name="fullname" placeholder="Your Full Name" required></td>
        </tr>
        <tr>
            <td><label for="username">Username</label></td>
            <td><input type="text" id="username" name="username" placeholder="Set a username" required></td>
        </tr>
        <tr>
            <td><label for="mobile">Mobile Number</label></td>
            <td><input type="tel" id="mobile" name="mobile" maxlength="10" placeholder="10 digit number"></td>
        </tr>
        <tr>
            <td><label for="email">Email</label></td>
            <td><input type="email" id="email" name="email" placeholder="Enter valid ID" required></td>
        </tr>
        <tr>
            <td><label for="password">Set Password</label></td>
            <td><input type="password" id="password" name="password" required maxlength="15"></td>
        </tr>
    </table>
    </form>

    <div class="buttons">
        <button onclick="signup()">Sign In</button>
        <input type="reset">
    </div>

    <div class="alternates">
    <div id="alternate-signup">
        Or Sign Up with
        <div id="alt-signup">
        <div class="icon-logo"><a href="https://workspace.google.com/intl/en-US/gmail/"><i class="fa-solid fa-envelope" style="color: rgb(0, 0, 0);"></i></a></div>
        <div class="icon-logo"><a href="https://x.com/"><i class="fa-brands fa-x-twitter" style="color: rgb(0, 0, 0);"></i></a></div>
        <div class="icon-logo"><a href="https://www.facebook.com/"><i class="fa-brands fa-facebook" style="color: rgb(3, 0, 255);"></i></a></div>
        </div>
    </div>

    <div id="login">
        <div>Already an existing user?</div>
        <div><a href="login.html">Login</a></div>
    </div>
    </div>

</div>

        <footer>
            <p><a href="contact.html ">Contact BookChâteau📧</a></p>
        </footer>

        {
            var fname = document.getElementById("fullname").value
            var uname = document.getElementById("username").value
            var phone = document.getElementById("mobile").value
            var mail = document.getElementById("email").value
            var pwrd = document.getElementById("password").value

            if (fname=="ShivaniR" && uname=="shivz13" && pwrd=="sanshi" && phone==1234567890)
            {
                alert('Signed in Successfully.')
            }
            else if (fname=="")
            {
                alert("Full Name is required.")
            }
            else
            {
            alert('Invalid Credentials')
            }
        }
    </script>

    </body>
</html>
