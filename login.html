<html>
    <head>
        <title>BookChâteau: Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="login.css">
        <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lato:wght@300;400;500;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    </head>

    <body>

        <div id="site-name">
        <div id="gold-text"><a href="about.html">BookChâteau</a></div>
        </div>

        <div id="login">
            <div id="img1"><img src="book shelf login1.png" alt="" width="500px" height="100px"></div>
            <div id="welcome">Welcome back, Dearest Gentle Reader</div>
            <div><input type="text" id="username" placeholder="Your Username"></div>
            <div id="password-box">
                <input type="password" id="password" placeholder="Enter Your Password">
                <a id="forgot">Forgot Password?</a>
            </div>
            <div id="remember-box">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
            </div>
            <div><button onclick="login()">Login</button></div>
            <div id="signup"><a href="signup.html">Don't have an account yet? <b>Sign Up</b></a></div>
            <div id="img2"><img src="book shelf login.png" alt="" width="300px" height="100px"></div>
        </div>

        <footer>
        <p><a href="contact.html">Contact BookChâteau📧</a></p>
        </footer>

    </body>

    <script>
            function login()
            {
                var uname = document.getElementById("username").value
                var pswrd = document.getElementById("password").value

                if (uname=="shivz13" && pswrd=="sanshi")
            {
                alert("Logged in Successfully.")
            }
                else if (pswrd=="" || uname=="")
            {
                alert("Please enter both Username and Password.")
            }
            else
            {
                alert("Invalid Credentials")
            }
            }
        </script>

</html>
